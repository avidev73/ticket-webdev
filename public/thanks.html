<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ticket received</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8; margin: 0; padding: 4rem 1rem; color: #1a202c; text-align: center;
    }
    .card {
      max-width: 480px; margin: 0 auto; background: #fff; border-radius: 12px;
      padding: 2.5rem 2rem; box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    .check { font-size: 3rem; }
    a { color: #3182ce; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Thanks — we got it!</h1>
    <p>Your report has been sent to our development team. We'll be in touch if we need more details.</p>
    <p><a href="/">Report another problem</a></p>
  </div>
</body>
</html>
